version: '3.8'

services:
  db_shard_1:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger_shard_1
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ledger_shard_1"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_shard_2:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledger_shard_2
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ledger_shard_2"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    environment:
      - DB_SHARD_1_URL=postgres://user:password@db_shard_1:5432/ledger_shard_1?sslmode=disable
      - DB_SHARD_2_URL=postgres://user:password@db_shard_2:5432/ledger_shard_2?sslmode=disable
      - REDIS_URL=redis:6379
    depends_on:
      db_shard_1:
        condition: service_healthy
      db_shard_2:
        condition: service_healthy
      redis:
        condition: service_healthy
